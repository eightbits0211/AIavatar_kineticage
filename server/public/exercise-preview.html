<!DOCTYPE html>
<html>
<head>
  <title>Exercise Image Preview — KineticAge</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
    h1 { color: #00d2ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, 300px); gap: 30px; margin-top: 20px; }
    .card { background: #16213e; border-radius: 12px; padding: 16px; text-align: center; }
    .card h3 { font-size: 14px; margin: 8px 0; }
    .card img { width: 250px; height: 250px; object-fit: contain; border-radius: 8px; background: #fff; }
    .note { color: #888; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Exercise Image Preview</h1>
  <p>Animated GIFs from GitHub CDN — free, no watermark, no API key needed.</p>
  <div class="grid" id="grid"></div>
  <script>
    const BASE = "https://raw.githubusercontent.com/omercotkd/exercises-gifs/main/assets";
    const exercises = [
      { name: "Barbell Bench Press", id: "0025" },
      { name: "Barbell Deadlift", id: "0032" },
      { name: "Kettlebell Swing", id: "0549" },
      { name: "Mountain Climber", id: "0630" },
      { name: "Diamond Push-Up", id: "0283" },
      { name: "Dead Bug", id: "0276" },
      { name: "Barbell Row", id: "0027" },
      { name: "Leg Press", id: "0739" },
      { name: "Walking Lunge", id: "1460" },
      { name: "Arnold Press", id: "0287" },
      { name: "Russian Twist", id: "0014" },
      { name: "Bear Crawl", id: "3360" },
    ];

    const grid = document.getElementById("grid");

    exercises.forEach(ex => {
      const card = document.createElement("div");
      card.className = "card";
      const img = document.createElement("img");
      img.src = `${BASE}/${ex.id}.gif`;
      img.alt = ex.name;
      const h3 = document.createElement("h3");
      h3.textContent = ex.name;
      card.appendChild(img);
      card.appendChild(h3);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
