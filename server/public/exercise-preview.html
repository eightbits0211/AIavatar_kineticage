<!DOCTYPE html>
<html>
<head>
  <title>Exercise Image Preview — KineticAge</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
    h1 { color: #00d2ff; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, 300px); gap: 30px; margin-top: 20px; }
    .card { background: #16213e; border-radius: 12px; padding: 16px; text-align: center; }
    .card h3 { font-size: 14px; margin: 8px 0; }
    .card img { width: 250px; height: 250px; object-fit: contain; border-radius: 8px; background: #fff; }
    .note { color: #888; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Exercise Image Preview</h1>
  <p>Each exercise alternates between start (frame 0) and end (frame 1) position every 800ms.</p>
  <div class="grid" id="grid"></div>
  <script>
    const exercises = [
      { name: "Barbell Back Squat", path: "Barbell_Full_Squat" },
      { name: "Push-Up", path: "Pushups" },
      { name: "Dumbbell Bicep Curl", path: "Dumbbell_Bicep_Curl" },
      { name: "Barbell Deadlift", path: "Barbell_Deadlift" },
      { name: "Pull-Up", path: "Pullups" },
      { name: "Plank", path: "Plank" },
      { name: "Mountain Climbers", path: "Mountain_Climbers" },
      { name: "Dumbbell Shoulder Press", path: "Dumbbell_Shoulder_Press" },
      { name: "Russian Twist", path: "Russian_Twist" },
      { name: "Glute Bridge", path: "Barbell_Glute_Bridge" },
      { name: "Walking Lunge", path: "Bodyweight_Walking_Lunge" },
      { name: "Burpee", path: "Bodyweight_Squat" },
    ];

    const base = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
    const grid = document.getElementById("grid");

    exercises.forEach(ex => {
      const card = document.createElement("div");
      card.className = "card";
      const img = document.createElement("img");
      img.src = base + ex.path + "/0.jpg";
      img.alt = ex.name;
      let frame = 0;
      setInterval(() => {
        frame = frame === 0 ? 1 : 0;
        img.src = base + ex.path + "/" + frame + ".jpg";
      }, 800);
      const h3 = document.createElement("h3");
      h3.textContent = ex.name;
      card.appendChild(img);
      card.appendChild(h3);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
